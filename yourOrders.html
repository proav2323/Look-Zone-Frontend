<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Look Zone</title>
    <link rel="stylesheet" href="/style.css" />
    <link rel="icon" type="image/x-icon" href="icon.svg" />
  </head>
  <body>
    <!-- loading -->
    <div class="loader-block">
      <div class="loader"></div>
    </div>

    <div class="content-show content">
      <!-- Navbar -->
      <header class="header">
        <nav class="navbar">
          <div class="nav">
            <div class="logo-block" onclick="redirectHome()">
              <i class="fa-solid fa-bag-shopping logo"></i>
              <span class="logo-text">Look Zone</span>
            </div>
            <div class="search-block">
              <i class="fa-solid fa-magnifying-glass search-icon"></i>
              <input
                class="search"
                type="search"
                value=""
                id="search"
                placeholder="Search"
                oninput="searchInputChange()"
                onsubmit="(e) => goToSearch(e.value)"
              />
            </div>
            <div class="auth">
              <button class="auth-button" onclick="goToLogin()">
                <i class="fa-solid fa-user"></i> Login In
              </button>
            </div>
            <div class="user-info">
              <button class="user-button cart" onclick="goToCart()">
                <i class="fa-solid fa-cart-shopping"></i>
                <span class="cart-item"></span>
              </button>
              <button class="user-button user" onclick="dropdown('dropdown')">
                <i class="fa-solid fa-user"></i>
              </button>
              <div class="dropdown">
                <button class="dropdown-button admin">
                  <i class="fa-solid fa-gear"></i>
                  <span class="dropdown-text">Dashboard</span>
                </button>
                <button class="dropdown-button" onclick="goToOrders()">
                  <i class="fa-solid fa-wallet"></i>
                  <span class="dropdown-text">Your Orders</span>
                </button>
                <button class="dropdown-button" onclick="toggleMode()">
                  <i class="fa-solid fa-moon dark-icon"></i>
                  <i class="fa-solid fa-bolt light-icon"></i>
                  <span class="dropdown-text mode-text">Dark Mode</span>
                </button>
                <button class="dropdown-button" onclick="goToAddress()">
                  <i class="fa-solid fa-house"></i>
                  <span class="dropdown-text">Your address</span>
                </button>
                <button class="dropdown-button logout" onclick="logout()">
                  <i class="fa-solid fa-right-from-bracket logout-icon"></i>
                  <span class="dropdown-text">Logout</span>
                </button>
              </div>
            </div>
          </div>
          <div class="search-block mobile">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input
              class="search"
              type="search"
              value=""
              id="search"
              placeholder="Search"
              oninput="searchInputChange()"
              onsubmit="(e) => goToSearch(e.value)"
            />
          </div>
        </nav>
      </header>

      <main class="main-content">
        <span class="orders-title">Your Orders</span>
        <div class="orders-container">
          <div class="order-details">
            <div class="order">
              <div class="order-actions">
                <span class="order-id"></span>
                <button onclick="closeOrderDetails()" class="close-btn">
                  X
                </button>
              </div>
              <div class="order-address">
                Address:
                <span class="order-address-text"></span>
              </div>
              <div class="order-price">
                Price:
                <span class="order-price-text red"></span>
              </div>
              <div class="order-date">
                Date:
                <span class="order-date-text"></span>
              </div>

              <div class="order-status">
                Status:
                <span class="order-status-text"></span>
              </div>

              <div class="order-products">products:</div>
              <div class="product-actions"></div>
            </div>
          </div>
          <table class="orders">
            <tr class="order-tr">
              <th class="order-th">Order ID</th>
              <th class="order-th mobile-d">Date</th>
              <th class="order-th mobile-d">Total Amount</th>
              <th class="order-th">Status</th>
            </tr>
          </table>
        </div>
        <div class="loader-block products-loading">
          <div class="loader"></div>
        </div>
        <div class="toast">
          <span class="msg">You are Now Logged In</span>
          <button class="close-toast">X</button>
        </div>
      </main>

      <footer></footer>
    </div>

    <!--my javascript file -->
    <script src="/script.js"></script>

    <!-- font awesome -->
    <script
      src="https://kit.fontawesome.com/eac59c5379.js"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
