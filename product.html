<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Look Zone</title>
    <link rel="stylesheet" href="/style.css" />
    <link rel="icon" type="image/x-icon" href="icon.svg" />
  </head>
  <body>
    <!-- loading -->
    <div class="loader-block">
      <div class="loader"></div>
    </div>

    <div class="content-show content">
      <!-- Navbar -->
      <header class="header">
        <nav class="navbar">
          <div class="nav">
            <div class="logo-block" onclick="redirectHome()">
              <i class="fa-solid fa-bag-shopping logo"></i>
              <span class="logo-text">Look Zone</span>
            </div>
            <div class="search-block">
              <i class="fa-solid fa-magnifying-glass search-icon"></i>
              <input
                class="search"
                type="search"
                value=""
                id="search"
                placeholder="Search"
                oninput="searchInputChange()"
                onsubmit="(e) => goToSearch(e.value)"
              />
            </div>
            <div class="auth">
              <button class="auth-button" onclick="goToLogin()">
                <i class="fa-solid fa-user"></i> Login In
              </button>
            </div>
            <div class="user-info">
              <button class="user-button cart" onclick="goToCart()">
                <i class="fa-solid fa-cart-shopping"></i>
                <span class="cart-item"></span>
              </button>
              <button class="user-button user" onclick="dropdown('dropdown')">
                <i class="fa-solid fa-user"></i>
              </button>
              <div class="dropdown">
                <button class="dropdown-button admin">
                  <i class="fa-solid fa-gear"></i>
                  <span class="dropdown-text">Dashboard</span>
                </button>
                <button class="dropdown-button" onclick="goToOrders()">
                  <i class="fa-solid fa-wallet"></i>
                  <span class="dropdown-text">Your Orders</span>
                </button>
                <button class="dropdown-button" onclick="toggleMode()">
                  <i class="fa-solid fa-moon dark-icon"></i>
                  <i class="fa-solid fa-bolt light-icon"></i>
                  <span class="dropdown-text mode-text">Dark Mode</span>
                </button>
                <button class="dropdown-button" onclick="goToAddress()">
                  <i class="fa-solid fa-house"></i>
                  <span class="dropdown-text">Your address</span>
                </button>
                <button class="dropdown-button logout" onclick="logout()">
                  <i class="fa-solid fa-right-from-bracket logout-icon"></i>
                  <span class="dropdown-text">Logout</span>
                </button>
              </div>
            </div>
          </div>
          <div class="search-block mobile">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input
              class="search"
              type="search"
              value=""
              id="search"
              placeholder="Search"
              oninput="searchInputChange()"
              onsubmit="(e) => goToSearch(e.value)"
            />
          </div>
        </nav>
      </header>

      <main class="main-content">
        <span class="text no-product">No Product Found</span>
        <div class="product-parent-div">
          <div class="product-div">
            <div class="product-images">
              <img
                src="https://media.istockphoto.com/id/1208634643/photo/apple-airpods-pro-on-a-white-background.jpg?s=612x612&w=0&k=20&c=TRA9JwDgw_6mv7PV8CRkYfw5oAJ4SVVC14ximky_dr0="
                class="product-selected-image"
              />
              <div class="product-small-images"></div>
            </div>
            <div class="product-info">
              <span class="product-title"></span>
              <span class="product-description"></span>
              <span class="product-price"
                ><span class="real-price"></span>
                <span class="original-price"></span
              ></span>
              <div class="product-action">
                <div class="rating"></div>
                <button class="add-to-cart"></button>
              </div>
            </div>
          </div>
          <span class="reviews-text text" style="font-size: 25px">Reviews</span>
          <div class="reviews">
            <div class="add-review">
              <div
                class="userprofile review-profile"
                style="justify-content: start"
              >
                <i class="fa-solid fa-user"></i>
                <span class="username"></span>
              </div>
              <div class="review-input-parent">
                <div
                  class="rating select-rating"
                  style="justify-content: start"
                >
                  <i
                    id="1"
                    class="fa-regular fa-star star btn"
                    onclick="changeStars(1)"
                  ></i>
                  <i
                    id="2"
                    class="fa-regular fa-star star btn"
                    onclick="changeStars(2)"
                  ></i>
                  <i
                    id="3"
                    class="fa-regular fa-star star btn"
                    onclick="changeStars(3)"
                  ></i>
                  <i
                    id="4"
                    class="fa-regular fa-star btn"
                    onclick="changeStars(4)"
                  ></i>
                  <i
                    id="5"
                    class="fa-regular fa-star star btn"
                    onclick="changeStars(5)"
                  ></i>
                </div>
                <div class="review-input-div">
                  <input
                    type="text"
                    value=""
                    class="review-input"
                    placeholder="Your Review"
                  />
                  <button class="add-review-button">Add</button>
                </div>
              </div>
            </div>
            <div class="others-reviews"></div>
          </div>
        </div>
        <div class="toast">
          <span class="msg">You are Now Logged In</span>
          <button class="close-toast">X</button>
        </div>
      </main>

      <footer></footer>
    </div>

    <!--my javascript file -->
    <script src="/script.js"></script>

    <!-- font awesome -->
    <script
      src="https://kit.fontawesome.com/eac59c5379.js"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
