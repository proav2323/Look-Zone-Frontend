<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Look Zone</title>
    <link rel="stylesheet" href="/style.css" />
    <link rel="icon" type="image/x-icon" href="icon.svg" />
  </head>
  <body>
    <!-- loading -->
    <div class="loader-block">
      <div class="loader"></div>
    </div>

    <div class="content-show content">
      <!-- Navbar -->
      <header class="header">
        <nav class="nav">
          <div class="logo-block" onclick="redirectHome()">
            <i class="fa-solid fa-bag-shopping logo"></i>
            <span class="logo-text">Look Zone</span>
          </div>
          <div class="search-block">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input
              class="search"
              type="search"
              placeholder="Search"
              onsubmit=""
            />
          </div>
          <div class="auth">
            <button class="auth-button" onclick="goToLogin()">
              <i class="fa-solid fa-user"></i> Login In
            </button>
          </div>
          <div class="user-info">
            <button class="user-button cart">
              <i class="fa-solid fa-cart-shopping"></i>
              <span class="cart-item"></span>
            </button>
            <button class="user-button user" onclick="dropdown('dropdown')">
              <i class="fa-solid fa-user"></i>
            </button>
            <div class="dropdown">
              <button class="dropdown-button admin">
                <i class="fa-solid fa-gear"></i>
                <span class="dropdown-text">Dashboard</span>
              </button>
              <button class="dropdown-button">
                <i class="fa-solid fa-wallet"></i>
                <span class="dropdown-text">Your Orders</span>
              </button>
              <button class="dropdown-button">
                <i class="fa-solid fa-gear"></i>
                <span class="dropdown-text">Settings</span>
              </button>
              <button class="dropdown-button logout">
                <i class="fa-solid fa-right-from-bracket logout-icon"></i>
                <span class="dropdown-text">Logout</span>
              </button>
            </div>
          </div>
        </nav>
      </header>

      <main class="main-content">
        <span class="text no-product">No Product Found</span>
        <div class="product-parent-div">
          <div class="product-div">
            <div class="product-images">
              <img
                src="https://media.istockphoto.com/id/1208634643/photo/apple-airpods-pro-on-a-white-background.jpg?s=612x612&w=0&k=20&c=TRA9JwDgw_6mv7PV8CRkYfw5oAJ4SVVC14ximky_dr0="
                class="product-selected-image"
              />
              <div class="product-small-images"></div>
            </div>
            <div class="product-info">
              <span class="product-title"></span>
              <span class="product-description"></span>
              <span class="product-price"
                ><span class="real-price"></span>
                <span class="original-price"></span
              ></span>
              <div class="product-action">
                <div class="rating"></div>
                <button class="add-to-cart"></button>
              </div>
            </div>
          </div>
          <span class="text" style="font-size: 25px">Reviews</span>
          <div class="reviews">
            <div class="add-review">
              <div class="userprofile review-profile">
                <i class="fa-solid fa-user"></i>
                <span class="username"></span>
              </div>
              <div class="review-input-parent">
                <div class="rating select-rating">
                  <i class="fa-solid fa-star star"></i>
                  <i class="fa-solid fa-star star"></i>
                  <i class="fa-solid fa-star star"></i>
                  <i class="fa-solid fa-star-half-stroke"></i>
                  <i class="fa-regular fa-star star"></i>
                </div>
                <div class="review-input-div">
                  <input
                    type="text"
                    value=""
                    class="review-input"
                    placeholder="Your Review"
                  />
                  <button class="add-review-button">Add</button>
                </div>
              </div>
            </div>
            <div class="others-reviews"></div>
          </div>
        </div>
      </main>

      <footer></footer>
    </div>

    <!--my javascript file -->
    <script src="/script.js"></script>

    <!-- font awesome -->
    <script
      src="https://kit.fontawesome.com/eac59c5379.js"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
