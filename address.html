<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Look Zone</title>
    <link rel="stylesheet" href="/style.css" />
    <link rel="icon" type="image/x-icon" href="icon.svg" />
  </head>
  <body>
    <!-- loading -->
    <div class="loader-block">
      <div class="loader"></div>
    </div>

    <div class="content-show content">
      <!-- Navbar -->
      <header class="header">
        <nav class="nav">
          <div class="logo-block" onclick="redirectHome()">
            <i class="fa-solid fa-bag-shopping logo"></i>
            <span class="logo-text">Look Zone</span>
          </div>
          <div class="search-block">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input
              class="search"
              type="search"
              value=""
              id="search"
              placeholder="Search"
              oninput="searchInputChange()"
              onsubmit="(e) => goToSearch(e.value)"
            />
          </div>
          <div class="auth">
            <button class="auth-button" onclick="goToLogin()">
              <i class="fa-solid fa-user"></i> Login In
            </button>
          </div>
          <div class="user-info">
            <button class="user-button cart" onclick="goToCart()">
              <i class="fa-solid fa-cart-shopping"></i>
              <span class="cart-item"></span>
            </button>
            <button class="user-button user" onclick="dropdown('dropdown')">
              <i class="fa-solid fa-user"></i>
            </button>
            <div class="dropdown">
              <button class="dropdown-button admin">
                <i class="fa-solid fa-gear"></i>
                <span class="dropdown-text">Dashboard</span>
              </button>
              <button class="dropdown-button" onclick="goToOrders()">
                <i class="fa-solid fa-wallet"></i>
                <span class="dropdown-text">Your Orders</span>
              </button>
              <button class="dropdown-button" onclick="showSideDropdown()">
                <i class="fa-solid fa-gear"></i>
                <span class="dropdown-text">Settings</span>
              </button>
              <button class="dropdown-button logout" onclick="logout()">
                <i class="fa-solid fa-right-from-bracket logout-icon"></i>
                <span class="dropdown-text">Logout</span>
              </button>
            </div>
            <div class="side-dropdown">
              <button class="dropdown-button" onclick="toggleMode()">
                <i class="fa-solid fa-moon dark-icon"></i>
                <i class="fa-solid fa-bolt light-icon"></i>
                <span class="dropdown-text mode-text">Dark Mode</span>
              </button>
              <button class="dropdown-button" onclick="goToAddress()">
                <i class="fa-solid fa-house"></i>
                <span class="dropdown-text">Your address</span>
              </button>
            </div>
          </div>
        </nav>
      </header>

      <main class="main-content">
        <div class="edit-address">
          <div class="edit">
            <div class="edit-actions">
              <span class="edit-text">Edit Address</span>
              <button class="close-btn" onclick="closeEditAddress()">X</button>
            </div>
            <div class="address-input-div">
              <input
                class="address-input"
                id="street"
                placeholder="street"
                value=""
                type="text"
              />
              <input
                class="address-input"
                id="city"
                placeholder="City"
                value=""
                type="text"
              />
              <input
                class="address-input"
                id="state"
                placeholder="State"
                value=""
                type="text"
              />
              <input
                class="address-input"
                id="zip"
                placeholder="Zip Code"
                value=""
                type="text"
              />
              <input
                class="address-input"
                id="country"
                placeholder="Country"
                value=""
                type="text"
              />
            </div>
          </div>
        </div>

        <div class="address-div">
          <div class="address">
            <span class="address-text">Your Address:</span>
            <button class="address-edit" onclick="showEditAddress()">
              <i class="fa-solid fa-pen-to-square"></i>
            </button>
          </div>
        </div>
        <div class="toast">
          <span class="msg">You are Now Logged In</span>
          <button class="close-toast">X</button>
        </div>
      </main>

      <footer></footer>
    </div>

    <!--my javascript file -->
    <script src="/script.js"></script>

    <!-- font awesome -->
    <script
      src="https://kit.fontawesome.com/eac59c5379.js"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
